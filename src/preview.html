<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HTML Preview</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        display: flex;
        flex-direction: column;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #bar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 14px;
        background: #161b22;
        color: #c9d1d9;
        font-size: 12px;
        border-bottom: 1px solid #30363d;
        flex: 0 0 auto;
      }
      #src {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        opacity: 0.85;
      }
      #bar button,
      #bar label { font-size: 12px; color: #c9d1d9; cursor: pointer; }
      #bar button {
        background: #21262d;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 4px 10px;
      }
      #bar button:hover { background: #30363d; }
      #bar label { display: inline-flex; align-items: center; gap: 4px; }
      /* The sandboxed renderer fills the rest and scrolls internally. */
      #sandbox { flex: 1 1 auto; width: 100%; border: 0; background: #fff; }
    </style>
  </head>
  <body>
    <header id="bar">
      <span id="src">読み込み中…</span>
      <label><input type="checkbox" id="toggle-scripts" checked /> スクリプト実行</label>
      <button id="reload" type="button">↻ 再読み込み</button>
    </header>
    <!-- Sandboxed page (permissive CSP) where the HTML actually renders. -->
    <iframe id="sandbox" src="preview-sandbox.html"></iframe>
    <script src="preview.js"></script>
  </body>
</html>
