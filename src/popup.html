<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>HTML Previewer</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 340px;
        padding: 12px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        color: #1f2328;
      }
      h1 { font-size: 14px; margin: 0 0 8px; }
      p.hint { margin: 0 0 8px; color: #57606a; font-size: 12px; line-height: 1.5; }
      textarea {
        width: 100%;
        height: 160px;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        border: 1px solid #d0d7de;
        border-radius: 6px;
        padding: 8px;
      }
      button {
        margin-top: 8px;
        width: 100%;
        padding: 8px;
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        background: #1f883d;
        border: 0;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover { background: #1a7f37; }
    </style>
  </head>
  <body>
    <h1>HTML をプレビュー</h1>
    <p class="hint">
      GitHub の HTML ファイルページでは、右下の「Preview HTML」ボタンが使えます。<br />
      ここに HTML を貼り付けて直接プレビューすることもできます。
    </p>
    <textarea id="html" placeholder="<!doctype html>&#10;<html>…"></textarea>
    <button id="go" type="button">プレビューを開く</button>
    <script src="popup.js"></script>
  </body>
</html>
